<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DigitalMe - 精准健康管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --primary: #0d9488;
    --primary-light: #5eead4;
    --primary-dark: #0f766e;
    --bg: #f0fdfa;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); }

  #app { max-width: 640px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
    color: white; padding: 16px 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .header h1 { font-size: 18px; font-weight: 600; margin: 0; }
  .header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  /* Demo toggle */
  .demo-toggle {
    display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;
  }
  .demo-toggle input[type="checkbox"] { width: 36px; height: 20px; appearance: none;
    background: rgba(255,255,255,0.3); border-radius: 10px; position: relative; cursor: pointer; }
  .demo-toggle input[type="checkbox"]::after {
    content: ""; width: 16px; height: 16px; background: white; border-radius: 50%;
    position: absolute; top: 2px; left: 2px; transition: transform 0.2s;
  }
  .demo-toggle input[type="checkbox"]:checked { background: rgba(255,255,255,0.6); }
  .demo-toggle input[type="checkbox"]:checked::after { transform: translateX(16px); }

  /* Chat area */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }

  /* Bubbles */
  .msg { display: flex; margin-bottom: 12px; animation: fadeIn 0.3s ease; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 85%; padding: 12px 16px; border-radius: 18px;
    font-size: 15px; line-height: 1.6; word-break: break-word;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #0d9488, #0891b2);
    color: white; border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: white; color: #1e293b; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .bubble table { font-size: 13px; border-collapse: collapse; width: 100%; margin: 8px 0; }
  .bubble th, .bubble td { border: 1px solid #e2e8f0; padding: 4px 8px; text-align: left; }
  .bubble th { background: #f1f5f9; font-weight: 600; }
  .bubble strong { color: #0d9488; }
  .bubble h4 { margin: 8px 0 4px; font-size: 15px; color: #0f766e; }
  .bubble blockquote { border-left: 3px solid #0d9488; padding-left: 12px; margin: 8px 0; color: #64748b; font-size: 13px; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }
  .bubble hr { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }

  /* Options chips */
  .options-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); animation: fadeIn 0.3s ease; }
  .options-card .q { font-size: 14px; color: #64748b; margin-bottom: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; margin: 4px; border-radius: 20px;
    background: #f0fdfa; border: 1.5px solid #99f6e4; color: #0f766e;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { background: #ccfbf1; border-color: #0d9488; }
  .chip.selected { background: #0d9488; color: white; border-color: #0d9488; }
  .chip-reason { font-size: 12px; color: #94a3b8; display: block; margin-top: 2px; }

  /* Progress card */
  .progress-card {
    background: white; border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  .progress-card .icon { width: 32px; height: 32px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .progress-card .icon.running { background: #fef3c7; }
  .progress-card .icon.done { background: #d1fae5; }
  .progress-card .icon.error { background: #fee2e2; }
  .progress-card .label { font-size: 14px; font-weight: 500; color: #1e293b; }
  .progress-card .status { font-size: 12px; color: #64748b; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 1s linear infinite; }

  /* Report card */
  .report-card {
    background: linear-gradient(135deg, #f0fdfa, #ecfeff);
    border: 1.5px solid #99f6e4; border-radius: 16px; padding: 20px;
    margin-bottom: 12px; animation: fadeIn 0.3s ease;
  }
  .report-card h1 { font-size: 18px; color: #0f766e; margin: 0 0 12px; }
  .report-card h2 { font-size: 16px; color: #0d9488; margin: 16px 0 8px; }
  .report-card h3 { font-size: 14px; color: #115e59; margin: 12px 0 6px; }
  .report-card table { font-size: 13px; border-collapse: collapse; width: 100%; margin: 8px 0; }
  .report-card th, .report-card td { border: 1px solid #e2e8f0; padding: 4px 8px; }
  .report-card th { background: #f1f5f9; }
  .report-card blockquote { border-left: 3px solid #0d9488; padding-left: 12px; margin: 8px 0; color: #64748b; font-size: 13px; }
  .report-card ul, .report-card ol { padding-left: 20px; }
  .report-card hr { border: none; border-top: 1px solid #ccfbf1; margin: 16px 0; }

  /* Interview card */
  .interview-card {
    background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); animation: fadeIn 0.3s ease;
  }
  .interview-card .q-item {
    display: flex; gap: 8px; margin-bottom: 12px; font-size: 14px; color: #334155;
  }
  .interview-card .q-num {
    width: 22px; height: 22px; border-radius: 50%; background: #0d9488; color: white;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    flex-shrink: 0; margin-top: 1px;
  }
  .interview-card textarea {
    width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 12px;
    font-size: 14px; resize: none; outline: none; font-family: inherit;
  }
  .interview-card textarea:focus { border-color: #0d9488; }
  .interview-card .submit-btn {
    margin-top: 8px; padding: 10px 24px; background: #0d9488; color: white;
    border: none; border-radius: 20px; font-size: 14px; cursor: pointer; float: right;
  }
  .interview-card .submit-btn:hover { background: #0f766e; }

  /* Confirm buttons */
  .confirm-bar { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
  .confirm-btn {
    padding: 10px 32px; border-radius: 20px; font-size: 14px; cursor: pointer;
    border: 1.5px solid #0d9488; transition: all 0.2s;
  }
  .confirm-btn.yes { background: #0d9488; color: white; }
  .confirm-btn.yes:hover { background: #0f766e; }
  .confirm-btn.no { background: white; color: #0d9488; }
  .confirm-btn.no:hover { background: #f0fdfa; }

  /* Input bar */
  .input-bar {
    flex-shrink: 0; padding: 12px 16px; background: white;
    border-top: 1px solid #e2e8f0; display: flex; gap: 10px; align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1; border: 1.5px solid #e2e8f0; border-radius: 20px; padding: 10px 16px;
    font-size: 15px; resize: none; outline: none; max-height: 120px;
    font-family: inherit; line-height: 1.4;
  }
  .input-bar textarea:focus { border-color: #0d9488; }
  .input-bar button {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #0d9488, #0891b2);
    border: none; color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .input-bar button:disabled { opacity: 0.4; cursor: default; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 8px 16px; }
  .typing span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%;
    animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>DigitalMe</h1>
      <div class="subtitle">精准健康管理助手</div>
    </div>
    <label class="demo-toggle">
      <span>Demo</span>
      <input type="checkbox" id="demoToggle">
    </label>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="msgInput" rows="1" placeholder="描述您的健康状况..."
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
const demoToggle = document.getElementById('demoToggle');

let ws = null;
let demoMode = false;
let demoData = [];
let demoIdx = 0;
let demoRunning = false;
const progressCards = {};

// Markdown renderer config
marked.setOptions({ breaks: true, gfm: true });

// ---- Render helpers ----

function scrollBottom() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

function renderMarkdown(text) {
  return marked.parse(text);
}

function addBubble(role, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollBottom();
}

function addAssistantMsg(content) {
  addBubble('assistant', renderMarkdown(content));
}

function addUserMsg(content) {
  addBubble('user', renderMarkdown(content));
}

function addInterviewCard(questions) {
  const card = document.createElement('div');
  card.className = 'interview-card';
  let html = '';
  questions.forEach((q, i) => {
    html += `<div class="q-item"><span class="q-num">${i+1}</span><span>${q}</span></div>`;
  });
  html += `<textarea id="interviewAnswer" rows="3" placeholder="请回答以上问题..."></textarea>`;
  html += `<button class="submit-btn" onclick="submitInterview()">提交</button>`;
  html += `<div style="clear:both"></div>`;
  card.innerHTML = html;
  chatArea.appendChild(card);
  scrollBottom();
}

function addOptionsCard(question, options, multiSelect) {
  const card = document.createElement('div');
  card.className = 'options-card';
  let html = `<div class="q">${question}</div><div class="chips">`;
  options.forEach(o => {
    html += `<div class="chip selected" data-key="${o.key}" onclick="toggleChip(this)">
      <span>${o.label}</span>
      ${o.reason ? `<span class="chip-reason">${o.reason}</span>` : ''}
    </div>`;
  });
  html += `</div>`;
  html += `<div class="confirm-bar">
    <button class="confirm-btn yes" onclick="confirmDims(true)">开始分析</button>
    <button class="confirm-btn no" onclick="confirmDims(false)">暂不</button>
  </div>`;
  card.innerHTML = html;
  chatArea.appendChild(card);
  scrollBottom();
}

function updateProgress(dimension, label, status) {
  let card = progressCards[dimension];
  if (!card) {
    card = document.createElement('div');
    card.className = 'progress-card';
    chatArea.appendChild(card);
    progressCards[dimension] = card;
  }
  const icons = { running: '<span class="spinner">&#9881;</span>', done: '&#10003;', error: '&#10007;' };
  const colors = { running: 'running', done: 'done', error: 'error' };
  const statusText = { running: '分析中...', done: '完成', error: '失败' };
  card.innerHTML = `
    <div class="icon ${colors[status]}">${icons[status]}</div>
    <div><div class="label">${label}</div><div class="status">${statusText[status]}</div></div>`;
  scrollBottom();
}

function addReportCard(content) {
  const card = document.createElement('div');
  card.className = 'report-card';
  card.innerHTML = renderMarkdown(content);
  chatArea.appendChild(card);
  scrollBottom();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.id = 'typing';
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ---- Chip selection ----

function toggleChip(el) {
  el.classList.toggle('selected');
}

// ---- Actions ----

function submitInterview() {
  const ta = document.getElementById('interviewAnswer');
  if (!ta || ta.disabled) return;
  const text = ta.value.trim();
  if (!text) return;
  ta.disabled = true;
  const btn = ta.parentElement.querySelector('.submit-btn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }
  addUserMsg(text);
  if (demoMode) { demoRunning = true; runDemo(); return; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'interview', answers: [text] }));
  }
}

function confirmDims(value) {
  // Collect selected chip keys
  const chips = document.querySelectorAll('.chip.selected');
  const selected = Array.from(chips).map(c => c.dataset.key);

  // Disable confirm buttons after click
  document.querySelectorAll('.confirm-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.4'; });

  if (value) addUserMsg('好的，开始分析');
  else addUserMsg('暂时不了');
  if (demoMode) { if (value) { demoRunning = true; runDemo(); } return; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (value && selected.length > 0) {
      // Send selected dims so server knows which ones user picked
      ws.send(JSON.stringify({ type: 'select', selected }));
    } else {
      ws.send(JSON.stringify({ type: 'confirm', value }));
    }
  }
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  addUserMsg(text);
  msgInput.value = '';
  msgInput.style.height = 'auto';

  if (demoMode) { demoRunning = true; runDemo(); return; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'message', content: text }));
  }
}

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ---- WebSocket ----

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = (e) => {
    removeTyping();
    const msg = JSON.parse(e.data);
    handleServerMsg(msg);
  };
  ws.onclose = () => { console.log('WS closed'); };
  ws.onerror = (e) => { console.error('WS error', e); };
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'message':
      if (msg.role === 'assistant') addAssistantMsg(msg.content);
      break;
    case 'interview':
      addInterviewCard(msg.questions);
      break;
    case 'options':
      addOptionsCard(msg.question, msg.options, msg.multi_select);
      break;
    case 'progress':
      updateProgress(msg.dimension, msg.label, msg.status);
      break;
    case 'report':
      addReportCard(msg.content);
      break;
    case 'error':
      addAssistantMsg(`**Error:** ${msg.message}`);
      break;
  }
}

// ---- Demo mode ----

async function loadDemo() {
  try {
    const resp = await fetch('/static/mock_conversation.json');
    demoData = await resp.json();
  } catch (e) {
    console.error('Failed to load demo data', e);
  }
}

async function runDemo() {
  while (demoIdx < demoData.length) {
    const item = demoData[demoIdx];

    // If this item needs user interaction and we're paused, wait
    if (item.wait_for_input && !demoRunning) {
      return;
    }

    demoIdx++;

    if (item.delay) {
      addTyping();
      await new Promise(r => setTimeout(r, item.delay));
      removeTyping();
    }

    // User items are already rendered by button/input handlers; only render server items
    if (item.role !== 'user') {
      handleServerMsg(item);
    }

    // If next item needs input, pause
    if (demoIdx < demoData.length && demoData[demoIdx].wait_for_input) {
      demoRunning = false;
      return;
    }
  }
}

demoToggle.addEventListener('change', async () => {
  demoMode = demoToggle.checked;
  chatArea.innerHTML = '';
  demoIdx = 0;
  demoRunning = false;
  Object.keys(progressCards).forEach(k => delete progressCards[k]);

  if (demoMode) {
    if (ws) { ws.close(); ws = null; }
    if (!demoData.length) await loadDemo();
    demoRunning = true;
    runDemo();
  } else {
    connectWS();
  }
});

// ---- Init ----
connectWS();
</script>
</body>
</html>
